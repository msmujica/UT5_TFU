services:
  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: Backend
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ut5_tfu_db
      DB_USER: root
      DB_PASSWORD: root

  mysql:
    image: mysql:8.0
    container_name: Database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ut5_tfu_db
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  mysql-data: